}

function loadInitial() {
  try {
    // Try new key first
    let raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) raw = localStorage.getItem("anime-tracker-v1"); // migrate from old
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length) {
        // reset imageState so covers reload on next open if missing
        return parsed.map(a => ({ ...a, imageState: a.image ? "done" : "idle", episodes: a.episodes || null, totalSeasons: a.totalSeasons || null, airing: a.airing || false }));

}

async function fetchAnimeInfo(title) {
  const q = SEARCH_OVERRIDES[title] || title;
  try {
    // Use AniList GraphQL — more reliable seasons/episodes data, no strict rate limit
    const query = `query($search:String){Media(search:$search,type:ANIME,sort:SEARCH_MATCH){id title{romaji english}coverImage{extraLarge large}episodes status season seasonYear relations{edges{relationType(version:2) node{type status episodes seasonYear}}}}}`;
    const res = await fetch("https://graphql.anilist.co", {
      method:"POST",
      headers:{"Content-Type":"application/json","Accept":"application/json"},
      body: JSON.stringify({ query, variables:{ search: q } })
    });
    if (!res.ok) throw new Error();
    const json = await res.json();
    const media = json?.data?.Media;
    if (!media) throw new Error();

    const image = media.coverImage?.extraLarge || media.coverImage?.large || null;
    const episodes = media.episodes || null;
    const airing = media.status === "RELEASING";

    // Count TV sequels and prequels to determine season number
    const edges = media.relations?.edges || [];
    const sequels = edges.filter(e => e.relationType === "SEQUEL" && e.node?.type === "ANIME").length;
    const prequels = edges.filter(e => e.relationType === "PREQUEL" && e.node?.type === "ANIME").length;
    const totalSeasons = prequels + 1 + sequels;

    return { image, episodes, totalSeasons: totalSeasons > 1 ? totalSeasons : 1, airing, malId: null };
  } catch {
    // Fallback to Jikan if AniList fails
    try {
      const q2 = SEARCH_OVERRIDES[title] || title;
      const res2 = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q2)}&limit=1&sfw=true`);
      if (!res2.ok) throw new Error();
      const d2 = await res2.json();
      const item = d2?.data?.[0];
      if (!item) return null;
      return {
        image: item.images?.jpg?.large_image_url || item.images?.jpg?.image_url || null,
        episodes: item.episodes || null,
        totalSeasons: 1,
        airing: item.status === "Currently Airing",
        malId: item.mal_id,
      };
    } catch { return null; }
  }
}


async function searchCovers(query) {
  try {
    const res = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&limit=8&sfw=true`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    return data?.data || [];
  } catch { return []; }
}

function useImageQueue(items, setItems) {
  useEffect(() => {
    let cancelled = false;
    const pending = items.filter(a => a.imageState === "idle");
    if (!pending.length) return;
    let i = 0;
    async function step() {
      if (cancelled) return;
      const anime = pending[i];
      if (!anime) return;
      setItems(prev => prev.map(a => a.id === anime.id ? {...a, imageState:"loading"} : a));
      const info = await fetchAnimeInfo(anime.title);
      if (!cancelled) setItems(prev => prev.map(a => a.id === anime.id ? {
        ...a,
        imageState: info?.image ? "done" : "error",
        image: info?.image || null,
        episodes: info?.episodes || null,
        totalSeasons: info?.totalSeasons || 1,
        airing: info?.airing || false,
        malId: info?.malId || null,
      } : a));
      i++;
      setTimeout(step, 700);
    }
    step();
    return () => { cancelled = true; };
  }, [items.length]);
}

function useInstallPrompt() {
  const [prompt, setPrompt] = useState(null);
  const [installed, setInstalled] = useState(false);
  const isIos = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  useEffect(()=>{
    if(isStandalone){ setInstalled(true); return; }
    const handler=(e)=>{ e.preventDefault(); setPrompt(e); };
    window.addEventListener("beforeinstallprompt", handler);
    window.addEventListener("appinstalled", ()=>setInstalled(true));
    return ()=>window.removeEventListener("beforeinstallprompt", handler);
  },[]);
  const install = async () => {
    if(isIos){ alert("Sur iPhone/iPad :\n1. Appuie sur le bouton Partager 📤\n2. Puis \"Sur l'écran d'accueil\""); return; }
    if(!prompt) return;
    prompt.prompt();
    const { outcome } = await prompt.userChoice;
    if(outcome === "accepted") setInstalled(true);
  };
  return { canInstall: !isStandalone && !installed, install };
}

// ---- Auto-update checker ----
const UPDATE_CHECK_KEY = "anime-last-check";
const CHECK_INTERVAL_MS = 24 * 60 * 60 * 1000; // 24h

async function checkForUpdates(items) {
  // Only check once every 24h
  const lastCheck = parseInt(localStorage.getItem(UPDATE_CHECK_KEY) || "0");
  const now = Date.now();
  if (now - lastCheck < CHECK_INTERVAL_MS) return [];
  localStorage.setItem(UPDATE_CHECK_KEY, String(now));

  const updates = [];
  // Check up to 20 items with existing MAL data, with delay between calls
  const toCheck = items.filter(a => a.malId).slice(0, 20);

  for (let i = 0; i < toCheck.length; i++) {
    const anime = toCheck[i];
    try {
      await new Promise(r => setTimeout(r, 500));
      const res = await fetch(`https://api.jikan.moe/v4/anime/${anime.malId}/relations`);
      if (!res.ok) continue;
      const data = await res.json();
      const sequels = (data?.data || []).filter(r => r.relation === "Sequel");
      const newSeasonCount = sequels.length + 1;
      if (newSeasonCount > (anime.totalSeasons || 1)) {
        // Fetch the latest sequel info
        const latestSequel = sequels[sequels.length - 1]?.entry?.[0];
        let newEps = null;
        let newImg = anime.image;
        if (latestSequel?.mal_id) {
          await new Promise(r => setTimeout(r, 400));
          const r2 = await fetch(`https://api.jikan.moe/v4/anime/${latestSequel.mal_id}`);
          if (r2.ok) {
            const d2 = await r2.json();
            newEps = d2?.data?.episodes;
            newImg = d2?.data?.images?.jpg?.large_image_url || anime.image;
          }
        }
        updates.push({
          id: anime.id,
          title: anime.title,
          image: newImg,
          oldSeasons: anime.totalSeasons || 1,
          newSeasons: newSeasonCount,
          newEpisodes: newEps,
        });
      }
    } catch { continue; }
  }
  return updates;
}

function StarRating({ rating, onChange }) {
  const [hover, setHover] = useState(0);
  return h("div", { className:"star-row" },
    [1,2,3,4,5].map(i =>
      h("button", {
        key: i,
        className: `star-btn ${(hover||rating) >= i ? "lit" : ""}`,
        onClick: () => onChange(rating === i ? 0 : i),
        onMouseEnter: () => setHover(i),
        onMouseLeave: () => setHover(0),
      }, "⭐")
    )
  );
}

    h("div", { className:"rating-panel", onClick:e=>e.stopPropagation() },

        h("button", { className:"rating-close", onClick:onClose }, "✕")
      ),
      h("div", { className:"rating-body" },
        h("div", { className:"rating-title" }, anime.title),
        h("div", { className:"rating-stars-row" },
          [1,2,3,4,5].map(i =>
            h("span", {
              key: i,
              className: "rating-star" + (current >= i ? " lit" : ""),

}

function TierListPage({ items }) {
  const [search, setSearch] = useState("");
  const [ratingTarget, setRatingTarget] = useState(null);
  const [ratings, setRatings] = useState(() => {
    try { return JSON.parse(localStorage.getItem("anime-ratings-v1") || "{}"); } catch { return {}; }
  });

  const saveRating = (id, stars) => {
    const next = { ...ratings, [id]: stars };
    if (stars === 0) delete next[id];
    setRatings(next);
    try { localStorage.setItem("anime-ratings-v1", JSON.stringify(next)); } catch {}
  };

  const filtered = useMemo(() => {
    if (!search.trim()) return items;
    const q = search.toLowerCase();
    return items.filter(a => a.title.toLowerCase().includes(q));
  }, [items, search]);

  const byStars = useMemo(() => {
    const groups = { 5:[], 4:[], 3:[], 2:[], 1:[], 0:[] };
    filtered.forEach(a => {
      const r = ratings[a.id] || 0;
      groups[r].push(a);
    });
    return groups;
  }, [filtered, ratings]);

  const STAR_LABELS = { 5:"Incontournable", 4:"Excellent", 3:"Bien", 2:"Moyen", 1:"Décevant" };

  return h("div", { className:"wrap" },
    h("div", { className:"tier-header" },
      h("div", { className:"eyebrow" }, "Classement"),
      h("h1", null, "Tier List"),
      h("div", { className:"subtitle" }, "Note tes animés de ⭐ à ⭐⭐⭐⭐⭐ en appuyant sur les étoiles.")
    ),
    h("input", { className:"tier-search", placeholder:"Rechercher un animé...", value:search, onChange:e=>setSearch(e.target.value) }),
    [5,4,3,2,1].map(stars =>
      byStars[stars].length > 0 && h("div", { key:stars, className:"tier-section" },
        h("div", { className:"tier-section-header" },
          h("div", { className:"tier-stars-label" }, "⭐".repeat(stars)),
          h("span", { style:{fontSize:"13px", fontWeight:600, color:"var(--ink)"} }, STAR_LABELS[stars]),
          h("span", { className:"tier-count" }, byStars[stars].length + " animé" + (byStars[stars].length > 1 ? "s" : ""))
        ),
        h("div", { className:"tier-grid" },
          byStars[stars].map(anime =>
            h("div", { key:anime.id, className:"tier-card" },
              h("div", { className:"tier-card-art", style:{cursor:"pointer"}, onClick:()=>setRatingTarget(anime) },
                anime.image
                  ? h("img", { src:anime.image, alt:anime.title, loading:"lazy" })
                  : h("div", { className:"placeholder" }, h("span", null, "🎬"), h("span", null, anime.title))
              ),
              h("div", { className:"tier-card-body" },
                h("div", { className:"tier-card-title", title:anime.title }, anime.title),
                h("div", { className:"star-row", style:{fontSize:"13px"} },
                  [1,2,3,4,5].map(i => h("span", { key:i, style:{opacity: (ratings[anime.id]||0) >= i ? 1 : 0.2} }, "⭐"))
                )
              )
            )
          )
        )
      )
    ),
    byStars[0].length > 0 && h("div", { className:"no-rating-section" },
      h("div", { className:"no-rating-title" }, "Non notés (" + byStars[0].length + ")"),
      h("div", { className:"tier-grid" },
        byStars[0].map(anime =>
          h("div", { key:anime.id, className:"tier-card" },
            h("div", { className:"tier-card-art", style:{cursor:"pointer"}, onClick:()=>setRatingTarget(anime) },
              anime.image
                ? h("img", { src:anime.image, alt:anime.title, loading:"lazy" })
                : h("div", { className:"placeholder" }, h("span", null, "🎬"), h("span", null, anime.title))
            ),
            h("div", { className:"tier-card-body" },
              h("div", { className:"tier-card-title", title:anime.title }, anime.title),
              h("div", { className:"star-row", style:{fontSize:"13px"} },
                [1,2,3,4,5].map(i => h("span", { key:i, style:{opacity:0.2} }, "⭐"))
              )
            )
          )
        )
      )
    ),
    ratingTarget && h(RatingPopup, {
      anime: ratingTarget,
      rating: ratings[ratingTarget.id] || 0,
      onRate: s => saveRating(ratingTarget.id, s),
      onClose: () => setRatingTarget(null)
    })
  );
}

];

function applyTheme(theme) {
  const root = document.documentElement;
  root.style.setProperty("--paper",   theme.paper);
  root.style.setProperty("--paper-2", theme.paper2);
  root.style.setProperty("--rule",    theme.rule);
  root.style.setProperty("--accent",  theme.accent);
  root.style.setProperty("--ink",     theme.ink);
  document.body.style.background = theme.paper;
  try { localStorage.setItem("anime-theme", theme.id); } catch {}
}

function ThemePicker({ onClose }) {
  const [current, setCurrent] = useState(() => localStorage.getItem("anime-theme") || "dark");
  const select = (t) => { setCurrent(t.id); applyTheme(t); };
  return h("div", { className:"theme-overlay", onClick:onClose },
    h("div", { className:"theme-sheet", onClick:e=>e.stopPropagation() },
      h("div", { className:"theme-handle" }),
      h("div", { className:"theme-title" }, "🎨 Couleur du fond"),
      h("div", { className:"theme-grid" },
        THEMES.map(t => h("div", { key:t.id, className:"theme-swatch", onClick:()=>select(t) },
          h("div", {
            className: "theme-circle" + (current===t.id ? " active" : ""),
            style:{ background:`linear-gradient(135deg, ${t.paper2}, ${t.accent})` }
          }),
          h("span", null, t.label)
        ))
      )
    )
  );
}

function App() {
  const [items, setItems] = useState(loadInitial);
  useEffect(() => {
    const saved = localStorage.getItem("anime-theme");
    if (saved) { const t = THEMES.find(x => x.id === saved); if (t) applyTheme(t); }
  }, []);
  const [page, setPage] = useState("list");
  const [showTheme, setShowTheme] = useState(false);
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [editTarget, setEditTarget] = useState(null);
  const [deleteTarget, setDeleteTarget] = useState(null);
  const [detailTarget, setDetailTarget] = useState(null);
  const [justSaved, setJustSaved] = useState(false);
  const [newSeasons, setNewSeasons] = useState([]);
  const { canInstall, install } = useInstallPrompt();

  useImageQueue(items, setItems);

  // Auto-check for new seasons on load
  useEffect(() => {
    const timer = setTimeout(async () => {
      const updates = await checkForUpdates(items);
      if (updates.length > 0) setNewSeasons(updates);
    }, 8000); // wait 8s after load so image queue gets priority
    return () => clearTimeout(timer);
  }, []);

  useEffect(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      setJustSaved(true);
      const t = setTimeout(()=>setJustSaved(false), 1200);
      return ()=>clearTimeout(t);
    } catch(e) {}
  }, [items]);

  const toggleStatus = id => setItems(prev => prev.map(a => {
    if(a.id!==id) return a;
    const order=["unknown","todo","done"];
    return {...a, status: order[(order.indexOf(a.status)+1)%3]};
  }));

  const removeItem = id => setItems(prev => prev.filter(a=>a.id!==id));
  const addItem = item => setItems(prev=>[item,...prev]);

  const saveEdit = (id, changes) => setItems(prev => prev.map(a => a.id===id ? {...a,...changes} : a));

  const applySeasonUpdates = () => {
    setItems(prev => prev.map(a => {
      const upd = newSeasons.find(u => u.id === a.id);
      if (!upd) return a;
      return { ...a, totalSeasons: upd.newSeasons, episodes: upd.newEpisodes || a.episodes, image: upd.image || a.image, imageState: "done" };
    }));
    setNewSeasons([]);
  };

  const counts = useMemo(()=>{
    const c={all:items.length,done:0,todo:0,unknown:0};
    items.forEach(a=>c[a.status]++);
    return c;
  },[items]);

  const filtered = useMemo(()=>{
    let list=[...items];
    if(filter!=="all") list=list.filter(a=>a.status===filter);
    if(search.trim()){const q=search.toLowerCase();list=list.filter(a=>a.title.toLowerCase().includes(q));}
    list.sort((a,b)=>a.title.localeCompare(b.title,"fr",{sensitivity:"base"}));
    return list;
  },[items,filter,search]);

  return h("div", null,
    page === "tierlist" && h(TierListPage, { items }),
    page === "list" && h("div",{className:"wrap"},
    newSeasons.length > 0 && h("div",{className:"update-banner"},
      h("div",{className:"update-banner-title"},
        h("span",null, `🎉 ${newSeasons.length} nouvelle${newSeasons.length>1?"s":""} saison${newSeasons.length>1?"s":""} disponible${newSeasons.length>1?"s":""}!`),
        h("button",{className:"update-dismiss",onClick:()=>setNewSeasons([])},"✕")
      ),
      h("div",{className:"update-list"},
        newSeasons.map(u => h("div",{key:u.id,className:"update-item"},
          u.image && h("img",{src:u.image,alt:""}),
          h("div",{className:"update-item-info"},
            h("span",{className:"update-item-title"},u.title),
            h("span",{className:"update-item-detail"},`S${u.oldSeasons} → S${u.newSeasons}${u.newEpisodes?" · "+u.newEpisodes+" éps":""}`)
          )
        ))
      ),
      h("button",{className:"update-apply-btn",onClick:applySeasonUpdates},"✅ Mettre à jour ma liste")
    ),
    h("div",{className:"top-bar"},
      h("div",null,
        h("div",{className:"eyebrow"},"Carnet de visionnage"),
        h("h1",null,"Ma liste animé"),
        h("div",{className:`save-indicator${justSaved?" saved":""}`}, justSaved?"✓ Sauvegardé":"")
      ),
      h("div",{className:"top-btns"},
        canInstall && h("button",{className:"install-btn", onClick:install}, "📲 Installer"),
        h("button",{className:"refresh-btn",onClick:()=>setShowTheme(true)}, "🎨"),
        h("button",{className:"refresh-btn",onClick:()=>setItems(prev=>prev.map(a=>({...a,imageState:"idle",episodes:null,airing:false})))}, "🔄"),
        h("button",{className:"add-trigger",onClick:()=>setShowAdd(true)},"+  Ajouter")
      )
    ),
    h("div",{className:"stats-row"},
      h("div",{className:"stat"},h("span",{className:"stat-num"},counts.all),h("span",{className:"stat-label"},"Total")),
      h("div",{className:"stat"},h("span",{className:"stat-num",style:{color:STATUS_META.done.color}},counts.done),h("span",{className:"stat-label"},"À jour")),
      h("div",{className:"stat"},h("span",{className:"stat-num",style:{color:STATUS_META.todo.color}},counts.todo),h("span",{className:"stat-label"},"À voir")),
      h("div",{className:"stat"},h("span",{className:"stat-num",style:{color:STATUS_META.unknown.color}},counts.unknown),h("span",{className:"stat-label"},"Non noté"))
    ),
    h("div",{className:"controls"},
      h("div",{className:"filter-tabs"},
        ["all","done","todo","unknown"].map(f=>h("button",{key:f,className:`tab${filter===f?" active":""}`,onClick:()=>setFilter(f)},
          `${f==="all"?"Tous":STATUS_META[f].label} (${counts[f]})`))
      ),
      h("div",{className:"search-add-row"},
        h("input",{className:"search-input",placeholder:"Rechercher...",value:search,onChange:e=>setSearch(e.target.value)})
      )
    ),
    filtered.length>0
      ? h("div",{className:"grid"},filtered.map(anime=>h(AnimeCard,{key:anime.id,anime,onToggleStatus:toggleStatus,onRemove:removeItem,onEdit:setEditTarget,onAskDelete:setDeleteTarget,onDetail:setDetailTarget})))
      : h("div",{className:"empty-state"},"Aucun animé ne correspond à ta recherche."),
    showAdd && h(AddPanel,{onAdd:addItem,onClose:()=>setShowAdd(false)}),
    showTheme && h(ThemePicker,{onClose:()=>setShowTheme(false)}),
    detailTarget && h(DetailPanel,{anime:detailTarget,onClose:()=>setDetailTarget(null),onEdit:setEditTarget,onToggleStatus:toggleStatus}),
    editTarget && h(EditPanel,{anime:editTarget,onSave:saveEdit,onClose:()=>setEditTarget(null)}),
    deleteTarget && h(DeleteConfirm,{
      anime:deleteTarget,
      onConfirm:()=>{ removeItem(deleteTarget.id); setDeleteTarget(null); },
      onCancel:()=>setDeleteTarget(null)
    })
    ),
    h("nav", { className:"bottom-nav" },
      h("button", { className:`nav-btn${page==="list"?" active":""}`, onClick:()=>setPage("list") },
        h("span", { className:"nav-icon" }, "🗂️"),
        "Ma liste"
      ),
      h("button", { className:`nav-btn${page==="tierlist"?" active":""}`, onClick:()=>setPage("tierlist") },
        h("span", { className:"nav-icon" }, "⭐"),
        "Tier List"
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
